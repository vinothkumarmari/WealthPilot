{% extends 'base.html' %}
{% block title %}Create Crisis Alert - MyWealthPilot{% endblock %}
{% block content %}
<div class="page-header">
    <h4><span class="material-icons-outlined">add_alert</span> Create Crisis Alert</h4>
    <p class="text-muted">Notify all users about a financial crisis and provide actionable suggestions</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Crisis Type *</label>
                    <select class="form-select" name="crisis_type" required>
                        <option value="pandemic">🦠 Pandemic / Disease Outbreak</option>
                        <option value="war">⚔️ War / Geopolitical Conflict</option>
                        <option value="oil_shock">⛽ Crude Oil Price Shock</option>
                        <option value="elnino">🌊 El Niño / Climate Event</option>
                        <option value="recession">📉 Recession</option>
                        <option value="inflation">💰 High Inflation</option>
                        <option value="market_crash">📊 Market Crash</option>
                        <option value="other">⚠️ Other</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Severity *</label>
                    <select class="form-select" name="severity" required>
                        <option value="low">Low</option>
                        <option value="moderate" selected>Moderate</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Alert Title *</label>
                <input type="text" class="form-control" name="title" required maxlength="200" placeholder="e.g., Crude Oil Prices Surge Above $100/barrel">
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" rows="3" maxlength="1000" placeholder="Describe the crisis situation..."></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Financial Impact</label>
                <textarea class="form-control" name="financial_impact" rows="2" maxlength="500" placeholder="How this affects personal finances..."></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Affected Sectors (comma-separated)</label>
                <input type="text" class="form-control" name="affected_sectors" placeholder="e.g., fuel, transportation, food, manufacturing">
            </div>

            <div class="mb-3">
                <label class="form-label">Financial Suggestions (one per line)</label>
                <textarea class="form-control" name="suggestions" rows="6" placeholder="Build up emergency fund to 12 months
Reduce discretionary spending by 20%
Avoid panic selling investments
Consider investing in defensive sectors
Lock in fixed deposit rates now
Review and increase health insurance coverage"></textarea>
                <small class="text-muted">Each line becomes a separate suggestion shown to users</small>
            </div>

            <div class="mb-3">
                <label class="form-label">Expires On (optional)</label>
                <input type="date" class="form-control" name="expires_at">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">
                    <span class="material-icons-outlined">notifications_active</span> Create & Notify All Users
                </button>
                <a href="{{ url_for('main.crisis_alerts') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
