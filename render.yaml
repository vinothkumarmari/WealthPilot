# render.yaml — Render.com Blueprint for MyWealthPilot
# Deploy: Connect GitHub repo → Render auto-detects this file

databases:
  - name: mywealthpilot-db
    plan: free
    databaseName: mywealthpilot
    user: mywealthpilot

services:
  - type: web
    name: mywealthpilot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn run:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mywealthpilot-db
          property: connectionString
      - key: FLASK_DEBUG
        value: false
      - key: FLASK_ENV
        value: production
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_FULL_NAME
        sync: false
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: SESSION_IDLE_TIMEOUT
        value: "1800"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
    healthCheckPath: /health
